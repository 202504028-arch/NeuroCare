<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>

<div class="registro">

    <a href="login.html" class="volver">←</a>

    <div class="logo">
        <img src="img/logo.png" alt="Logo NeuroCare">
        <div>
            <h2>Neuro<span>Care</span></h2>
            <p>Paciente</p>
        </div>
    </div>

    <h1>Crear cuenta</h1>
    <p class="subtitulo">Completa tus datos para comenzar</p>

    <div class="campo">
        <label>Nombre completo</label>
        <input type="text" placeholder="Ej. Juan Carlos Pérez">
    </div>

    <div class="campo">
        <label>Número de celular o correo electrónico</label>
        <input type="text" placeholder="Ej. 55 1234 5678 o correo@email.com">
    </div>

    <div class="campo">
        <label>Edad</label>
        <input type="number" placeholder="Ej. 72">
    </div>

    <div class="campo">
        <label>Contraseña</label>
        <input type="password" placeholder="Crea una contraseña">
    </div>

    <div class="campo">
        <label>Confirmar contraseña</label>
        <input type="password" placeholder="Confirma tu contraseña">
    </div>

    <button>Crear cuenta</button>

    <a href="login.html" class="login-link">
        ¿Ya tienes cuenta? Iniciar sesión
    </a>

</div>

</body>
</html>
